name: Deploy

on:
    release:
        types: [ published ]

jobs:
    test:
        uses: ./.github/workflows/test.yml
    deploy:
        needs: test
        permissions:
            id-token: write
        environment: nuget
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            -   uses: ./.github/actions/setup-dotnet-environment
            -   name: Pack
                run: dotnet pack ./src/AustinS.TailwindCssTool -c Release /p:Version=$RELEASE_VERSION
                env:
                    RELEASE_VERSION: ${{ github.event.release.tag_name }}
            -   name: NuGet login
                id: login
                uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1
                with:
                    user: ${{ secrets.NUGET_USERNAME }}
            -   name: Publish to NuGet
                run: dotnet nuget push ./src/AustinS.TailwindCssTool/bin/Release/AustinS.TailwindCssTool.$RELEASE_VERSION.nupkg -s https://api.nuget.org/v3/index.json -k $NUGET_API_KEY
                env:
                    RELEASE_VERSION: ${{ github.event.release.tag_name }}
                    NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
