name: Deploy

on:
    release:
        types: [ published ]

jobs:
    test:
        uses: ./.github/workflows/test.yml
    deploy:
        needs: test
        permissions:
            id-token: write
        environment: nuget
        runs-on: ubuntu-latest
        env:
            NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
        steps:
            -   name: Checkout
                uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            -   uses: ./.github/actions/setup-dotnet-environment
            -   name: Restore dependencies
                run: dotnet restore ./src/AustinS.TailwindCssTool --locked-mode
            -   name: Pack
                run: dotnet pack ./src/AustinS.TailwindCssTool --no-restore -c Release /p:Version=$RELEASE_VERSION
                env:
                    RELEASE_VERSION: ${{ github.event.release.tag_name }}
            -   name: NuGet login
                id: login
                uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
                with:
                    user: ${{ secrets.NUGET_USERNAME }}
            -   name: Publish to NuGet
                run: dotnet nuget push ./src/AustinS.TailwindCssTool/bin/Release/AustinS.TailwindCssTool.$RELEASE_VERSION.nupkg -s https://api.nuget.org/v3/index.json -k $NUGET_API_KEY
                env:
                    RELEASE_VERSION: ${{ github.event.release.tag_name }}
                    NUGET_API_KEY: ${{ steps.login.outputs.NUGET_API_KEY }}
