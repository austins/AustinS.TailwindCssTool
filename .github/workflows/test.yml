name: Test

on: [ workflow_call, workflow_dispatch ]

jobs:
    test:
        runs-on: ubuntu-latest
        env:
            NUGET_PACKAGES: ${{ github.workspace }}/.nuget/packages
        steps:
            -   name: Checkout
                uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
            -   uses: ./.github/actions/setup-dotnet-environment
            -   name: Restore dependencies
                run: dotnet restore ./tests/AustinS.TailwindCssTool.Tests.Unit --locked-mode
            -   name: Test for .NET 8
                run: dotnet test --no-restore --framework net8.0 -c Release --results-directory ./test-results -- --report-ctrf
            -   name: Test for .NET 9
                run: dotnet test --no-restore --framework net9.0 -c Release --results-directory ./test-results -- --report-ctrf
            -   name: Test for .NET 10
                run: dotnet test --no-restore --framework net10.0 -c Release --results-directory ./test-results -- --report-ctrf
            -   if: always()
                name: Publish test report
                uses: ctrf-io/github-test-reporter@e500b992f936420eb633c91644cf10d4d71df700 # v1.1.0
                with:
                    report-path: ./test-results/*.ctrf
                    summary-report: true
                    file-report: true
                    failed-folded-report: true
                    skipped-report: true
