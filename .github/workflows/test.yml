name: Test

on:
    workflow_call:

jobs:
    test:
        runs-on: ubuntu-latest
        steps:
            -   name: Checkout
                uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            -   uses: ./.github/actions/setup-dotnet-environment
            -   name: Test for .NET 8
                run: dotnet test --framework net8.0 -c Release --results-directory ./test-results -- --report-ctrf
            -   name: Test for .NET 9
                run: dotnet test --framework net9.0 -c Release --results-directory ./test-results -- --report-ctrf
            -   name: Test for .NET 10
                run: dotnet test --framework net10.0 -c Release --results-directory ./test-results -- --report-ctrf
            -   if: always()
                name: Publish test report
                uses: ctrf-io/github-test-reporter@0f299074936c32ccaab5be5230511f6b2b9080aa # v1.0.28
                with:
                    report-path: ./test-results/*.ctrf
                    summary-report: true
                    file-report: true
                    failed-folded-report: true
                    skipped-report: true
