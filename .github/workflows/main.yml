name: Main

on:
    push:
        branches: [ main ]
        paths:
            - '.editorconfig'
            - '*.slnx'
            - 'Directory.Build.props'
            - 'global.json'
            - 'src/**'
            - 'tests/**'
    workflow_dispatch:

concurrency:
    group: main
    cancel-in-progress: true

jobs:
    test:
        uses: ./.github/workflows/test.yml
